name: Generate Snake                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                          
on:                                                                                                                                                                                                                                                       
  schedule:     
    - cron: "0 0 * * *"                                                                                                                                                                                                                                   
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=#ff4b4b&color_dots=#0d1117,#1a0000,#3d0000,#7a0000,#ff4b4b
            dist/github-contribution-grid-snake-light.svg?color_snake=#ff4b4b&color_dots=#ffffff,#ffe0e0,#ff9999,#ff4b4b,#cc0000


      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

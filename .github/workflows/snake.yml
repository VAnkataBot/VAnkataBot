name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23ff4b4b&color_dots=%230d1117,%231a0000,%233d0000,%237a0000,%23ff4b4b
            dist/github-contribution-grid-snake-light.svg?color_snake=%23ff4b4b&color_dots=%23ffffff,%23ffe0e0,%23ff9999,%23ff4b4b,%23cc0000

      - name: Fix snake color
        run: |
          sed -i 's/--cs:ff4b4b/--cs:#ff4b4b/g' dist/github-contribution-grid-snake-dark.svg
          sed -i 's/--cs:ff4b4b/--cs:#ff4b4b/g' dist/github-contribution-grid-snake-light.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
